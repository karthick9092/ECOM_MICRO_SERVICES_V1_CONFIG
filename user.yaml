spring:
  application:
    name: user
  profiles:
    active: prod

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  config:
    #import: "classpath:application_${spring.profiles.active}.yaml"
    import: configserver:http://localhost:8888

management:
    endpoints:
      web:
        exposure:
          include: "*"
