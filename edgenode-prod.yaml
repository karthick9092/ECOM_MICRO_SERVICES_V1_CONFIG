server:
  port: 8084

spring:
  cloud:
    gateway:
      mvc:
        routes:
          - id: user-service
            uri: lb://USER
            predicates:
              - Path=/users/**
            filters:
              - RewritePath=/users/(?<segment>.*), /api/users/${segment}

app-info :
  name: User Management API
  description: CRUD operations for user management production environment
  version: 1.0.0
  developer:
    name: Your Name
    email: your.email@example.com
  contact:
    name: Support Team
    email: support@test.com

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8083/eureka/
