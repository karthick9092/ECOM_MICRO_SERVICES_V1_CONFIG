server:
  port: 8084

spring:
  cloud:
    gateway:
      server:
        webflux:
          # --- HTTP Client Configurations ---
          httpclient:
            connect-timeout: 3000
            response-timeout: 5s

          # --- Global CORS Configurations ---
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:3000"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - "*"
                exposed-headers:
                  - "*"
                allow-credentials: true
                max-age: 3600

          # --- Route Configurations ---
          routes:
            - id: user-service
              uri: lb://user  # Kept lowercase to safely align with your Eureka lower-case-service-id setting
              predicates:
                - Path=/users/**
              filters:
                # Rewrites incoming /users/123 to target /api/users/123
                - RewritePath=/users/(?<segment>.*), /api/users/${segment}
                
                # Resilient Exponential Backoff Retry configuration
                - name: Retry
                  args:
                    retries: 3
                    methods:
                      - GET
                    statuses:
                      - INTERNAL_SERVER_ERROR
                      - BAD_GATEWAY
                      - SERVICE_UNAVAILABLE
                      - GATEWAY_TIMEOUT
                    exceptions:
                      - java.io.IOException
                      - java.util.concurrent.TimeoutException
                      - org.springframework.cloud.gateway.support.TimeoutException
                    backoff:
                      firstBackoff: 2s
                      maxBackoff: 10s
                      factor: 2
                # --- Resilience4j Circuit Breaker Filter ---
                - name: CircuitBreaker
                  args:
                    name: userServiceCircuitBreaker
                    # If user-service fails, forward internally to a fallback endpoint
                    fallbackUri: forward:/fallback/appinfo

# --- Resilience4j Fine-Tuned Configuration Properties ---
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10                  # Evaluates the last 20 requests
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50               # Trips the circuit open if 50% of calls fail
        slowCallRateThreshold: 50              # Trips open if 50% of calls are slower than time limit
        slowCallDurationThreshold: 3s          # What counts as a "slow call"
        waitDurationInOpenState: 15s           # Stays open for 15s before trying again (Half-Open)
        permittedNumberOfCallsInHalfOpenState: 5 # Allows 5 test requests in Half-Open state
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      userServiceCircuitBreaker:
        baseConfig: default                    # Tells this specific instance to use the rules above

    --- Time Limiter (Timeout Engine) Configuration ---
    timelimiter:
      configs:
        default:
          timeoutDuration: 4s                    # Drops connection if downstream takes > 4 seconds
          cancelRunningFuture: true
    instances:
      userServiceCircuitBreaker:
        baseConfig: default    
             
app-info :
  name: User Management API
  description: CRUD operations for user management production environment
  version: 1.0.0
  developer:
    name: Your Name
    email: your.email@example.com
  contact:
    name: Support Team
    email: support@test.com

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8083/eureka/

info:
  app:
    name: Edge node Service
    description: Api gateway for microservice
    version: 1.0.0
    author: Logesh

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.loadbalancer: DEBUG
    reactor.netty.http.client: DEBUG
