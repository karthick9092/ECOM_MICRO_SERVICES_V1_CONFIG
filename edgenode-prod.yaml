server:
  port: 8084

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://USER
              predicates:
                - Path=/users/**
              filters:
                - RewritePath=/users/(?<segment>.*), /api/users/${segment}
              retry:
                enabled: true
                max-attempts: 3
                methods: GET 
                exceptions:
                  - badrequestexception
                  - java.io.IOException
                  - java.util.concurrent.TimeoutException
                backoff:
                  first-backoff: 2s
                  max-backoff: 10s
                  factor: 2.0

app-info :
  name: User Management API
  description: CRUD operations for user management production environment
  version: 1.0.0
  developer:
    name: Your Name
    email: your.email@example.com
  contact:
    name: Support Team
    email: support@test.com

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: true
    register-with-eureka: true
    serviceUrl:
      defaultZone: http://localhost:8083/eureka/

info:
  app:
    name: Edge node Service
    description: Api gateway for microservice
    version: 1.0.0
    author: Logesh

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
