server:
  port: 8888

spring:
  application:
    name: configserver
  profiles:
    #active: native
    active: git
  cloud:
    config:
      server:
        #native:
          #search-locations: classpath:/config
        git:
          uri: https://github.com/karthick9092/ECOM_MICRO_SERVICES_V1.git
          timeout: 5000
          clone-on-start: true
          default-label: main
  management:
    endpoints:
      web:
        exposure:
          include: "*"